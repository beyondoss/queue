[env]
POSTGRES_EXTRA_CONFIGURE_OPTIONS = "--without-icu"

[tools]
dprint = "latest"
rust = { version = "1.92", components = "rustfmt,clippy", targets = "aarch64-unknown-linux-gnu,x86_64-unknown-linux-gnu" }
yamlfmt = "latest"
cargo-binstall = "latest"
"cargo:sqlx-cli" = "latest"
"cargo:cross" = "latest"
node = "lts"
postgres = "18"

[tasks."build:rs"]
run = "cargo build"

[tasks."build:rs:release"]
run = "cargo build --release"

[tasks."build:ts"]
run = "npm run build --workspaces --if-present"
dir = "sdk/ts"
depends = ["generate:types"]

[tasks."check:rs"]
run = [
  "cargo clippy --workspace --exclude beyond-queue-extension -- -D warnings",
  "PGRX_PG_CONFIG_PATH=$(which pg_config) cargo clippy -p beyond-queue-extension --features pg18 -- -D warnings",
]

[tasks."check:ts"]
run = "npm run typecheck --workspaces --if-present"
dir = "sdk/ts"
depends = ["generate:types"]

[tasks."check:fmt"]
run = "dprint check"

[tasks."format"]
run = "dprint fmt"

[tasks."install:ts"]
run = "npm install"
dir = "sdk/ts"

[tasks."test:unit:rs"]
run = "cargo test --lib"

[tasks."test:integration:rs"]
run = "cargo test --test integration_test"

[tasks."test:integration:queue"]
run = "npm test"
dir = "sdk/ts/queue"
depends = ["generate:types", "build:rs"]

[tasks."test:integration:events"]
run = "npm test"
dir = "sdk/ts/events"
depends = ["generate:types", "build:rs"]

[tasks."test:ts"]
depends = [
  "test:integration:queue",
  "test:integration:events",
  "test:types:queue",
  "test:types:events",
]

[tasks."test:integration:ts"]
depends = ["test:ts"]

[tasks."test:types:queue"]
run = "npx vitest --config vitest.typecheck.config.ts --run"
dir = "sdk/ts/queue"
depends = ["generate:types"]

[tasks."test:types:events"]
run = "npx vitest --config vitest.typecheck.config.ts --run"
dir = "sdk/ts/events"
depends = ["generate:types"]

[tasks."test:types:ts"]
depends = ["test:types:queue", "test:types:events"]

[tasks."generate:openapi"]
run = "cargo run -- generate-openapi"

[tasks."generate:types"]
run = [
  "node queue/scripts/generate-types.mjs",
  "node events/scripts/generate-types.mjs",
]
dir = "sdk/ts"
depends = ["install:ts", "generate:openapi"]

[tasks."sqlx:prepare"]
run = """
PG_PORT=5445
docker rm -f bq-sqlx-prepare 2>/dev/null || true
docker run --rm --name bq-sqlx-prepare \
  -e POSTGRES_PASSWORD=postgres \
  -p ${PG_PORT}:5432 \
  -d postgres:18
echo "Waiting for postgres..."
until docker exec bq-sqlx-prepare pg_isready -U postgres > /dev/null 2>&1; do sleep 0.5; done
DB="postgres://postgres:postgres@localhost:${PG_PORT}/postgres"
docker exec bq-sqlx-prepare psql -U postgres -c "CREATE SCHEMA IF NOT EXISTS queue;"
docker exec -i bq-sqlx-prepare psql -U postgres < beyond-queue-extension/sql/schema.sql
docker exec -i bq-sqlx-prepare psql -U postgres < tests/fixtures/hot_paths.sql
DATABASE_URL="$DB" cargo sqlx prepare --workspace -- --tests
docker stop bq-sqlx-prepare
"""

# Build the pgrx extension .so for the host OS (requires local pg_config).
[tasks."extension:build"]
run = "PGRX_PG_CONFIG_PATH=/usr/bin/pg_config cargo build --release -p beyond-queue-extension --features pg18"

# Build the pgrx extension .so for linux/amd64 (postgres:18, glibc/Debian).
# Output: target/release/libbeyond_queue_extension.so
[tasks."extension:build:linux:amd64"]
run = """
docker run --rm --platform linux/amd64 \
  -v "$(pwd)":/src \
  -e DEBIAN_FRONTEND=noninteractive \
  postgres:18 /bin/sh -c '
    apt-get update -qq 2>/dev/null &&
    apt-get install -y -qq curl pkg-config libssl-dev build-essential libclang-dev clang postgresql-server-dev-18 2>/dev/null &&
    curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92 --profile minimal --quiet 2>&1 | tail -2 &&
    . "$HOME/.cargo/env" &&
    PGRX_PG_CONFIG_PATH=/usr/bin/pg_config cargo build --release --no-default-features --features pg18 -p beyond-queue-extension --manifest-path /src/beyond-queue-extension/Cargo.toml --target-dir /src/target 2>&1 &&
    echo "Built: /src/target/release/libbeyond_queue_extension.so"
  '
"""

# Build the pgrx extension .so for linux/arm64 (postgres:18, Apple Silicon / Graviton).
# Output: target/aarch64-unknown-linux-gnu/release/libbeyond_queue_extension.so
[tasks."extension:build:linux:arm64"]
run = """
docker run --rm --platform linux/arm64 \
  -v "$(pwd)":/src \
  -e DEBIAN_FRONTEND=noninteractive \
  postgres:18 /bin/sh -c '
    apt-get update -qq 2>/dev/null &&
    apt-get install -y -qq curl pkg-config libssl-dev build-essential libclang-dev clang postgresql-server-dev-18 2>/dev/null &&
    curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92 --profile minimal --quiet 2>&1 | tail -2 &&
    . "$HOME/.cargo/env" &&
    PGRX_PG_CONFIG_PATH=/usr/bin/pg_config cargo build --release --no-default-features --features pg18 -p beyond-queue-extension --manifest-path /src/beyond-queue-extension/Cargo.toml --target-dir /src/target 2>&1 &&
    mkdir -p /src/target/aarch64-unknown-linux-gnu/release &&
    cp /src/target/release/libbeyond_queue_extension.so /src/target/aarch64-unknown-linux-gnu/release/libbeyond_queue_extension.so &&
    echo "Built: /src/target/aarch64-unknown-linux-gnu/release/libbeyond_queue_extension.so"
  '
"""

# Compare real pgmq (PL/pgSQL) vs beyond-queue pgrx extension.
# Spins up two postgres:18 containers, loads schemas, runs bench, prints diff, tears down.
# Usage: mise run bench            → quick profile
#        mise run bench full       → full profile
#        mise run bench quick fifo → quick profile, FIFO bench
[tasks."bench:quick"]
run = "mise run bench quick"

[tasks."bench:full"]
run = "mise run bench full"

[tasks."bench"]
run = """
#!/usr/bin/env bash
set -euo pipefail

PROFILE="${1:-quick}"
shift 1 2>/dev/null || true
EXTRA_ARGS="$@"

BASELINE_PORT=5446
TREATMENT_PORT=5444
BASELINE_URL="postgres://postgres:postgres@127.0.0.1:${BASELINE_PORT}/postgres"
TREATMENT_URL="postgres://postgres:postgres@127.0.0.1:${TREATMENT_PORT}/postgres"
OSS_PGMQ_SQL="bench/fixtures/pgmq_baseline.sql"

if [ ! -f "target/release/libbeyond_queue_extension.so" ]; then
  echo "ERROR: target/release/libbeyond_queue_extension.so not found." >&2
  echo "Run: mise run extension:build" >&2
  exit 1
fi

cleanup() { docker rm -f bq-bench bq-bench-ext > /dev/null 2>&1 || true; }
trap cleanup EXIT

docker rm -f bq-bench bq-bench-ext 2>/dev/null || true

echo "Starting postgres containers..."
docker run -d --name bq-bench \
  -e POSTGRES_PASSWORD=postgres -p ${BASELINE_PORT}:5432 postgres:18

docker create --name bq-bench-ext \
  -e POSTGRES_PASSWORD=postgres -p ${TREATMENT_PORT}:5432 \
  postgres:18 postgres -c shared_preload_libraries=libbeyond_queue_extension
docker cp target/release/libbeyond_queue_extension.so \
  bq-bench-ext:/usr/lib/postgresql/18/lib/libbeyond_queue_extension.so
docker start bq-bench-ext

until docker exec bq-bench pg_isready -U postgres > /dev/null 2>&1; do sleep 0.3; done
until docker exec bq-bench-ext pg_isready -U postgres > /dev/null 2>&1; do sleep 0.3; done

echo "Loading schemas..."
docker exec -i bq-bench psql -U postgres < "$OSS_PGMQ_SQL" > /dev/null
docker exec -i bq-bench-ext psql -U postgres < beyond-queue-extension/sql/schema.sql > /dev/null
docker exec -i bq-bench-ext psql -U postgres < tests/fixtures/hot_paths.sql > /dev/null
docker exec -i bq-bench-ext psql -U postgres < tests/fixtures/load_pgrx_extension.sql > /dev/null

mkdir -p bench/out
cargo build --release -p bench

echo ""
echo "=== baseline (real pgmq PL/pgSQL) ==="
cargo run --release -p bench -- \
  --database-url "$BASELINE_URL" \
  --schema pgmq \
  run-all --profile "$PROFILE" --output bench/out/baseline.json $EXTRA_ARGS

echo ""
echo "=== treatment (beyond-queue pgrx) ==="
cargo run --release -p bench -- \
  --database-url "$TREATMENT_URL" \
  run-all --profile "$PROFILE" --output bench/out/treatment.json $EXTRA_ARGS

echo ""
echo "=== diff ==="
cargo run --release -p bench -- compare bench/out/baseline.json bench/out/treatment.json
"""
