name: Release Extension
on:
  push:
    tags:
      - "ext-v*"
env:
  CARGO_TERM_COLOR: always
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            pg: 17
          - os: ubuntu-latest
            arch: amd64
            pg: 18
          - os: ubuntu-24.04-arm
            arch: arm64
            pg: 17
          - os: ubuntu-24.04-arm
            arch: arm64
            pg: 18
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - name: install postgres dev headers
        run: |
          sudo apt-get install -y gnupg2 lsb-release
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-${{ matrix.pg }} libclang-dev clang
      - name: build extension
        env:
          PGRX_PG_CONFIG_PATH: /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
        run: |
          cargo build --release --no-default-features --features pg${{ matrix.pg }} \
            -p beyond-queue-extension
      - name: package
        run: |
          VERSION=${GITHUB_REF_NAME#ext-v}
          PG=${{ matrix.pg }}
          mkdir -p dist/usr/lib/postgresql/${PG}/lib
          mkdir -p dist/usr/share/postgresql/${PG}/extension
          # Canonical install name is `beyond_queue` (the beyond-pg supervisor's
          # REQUIRED_EXTENSIONS / shared_preload). cargo emits libbeyond_queue.so;
          # install it as beyond_queue.so so $libdir/beyond_queue resolves.
          cp target/release/libbeyond_queue.so \
             dist/usr/lib/postgresql/${PG}/lib/beyond_queue.so
          cp beyond-queue-extension/beyond_queue.control \
             dist/usr/share/postgresql/${PG}/extension/
          cat beyond-queue-extension/sql/schema.sql \
              tests/fixtures/hot_paths.sql \
              tests/fixtures/load_pgrx_extension.sql \
              > dist/usr/share/postgresql/${PG}/extension/beyond_queue--${VERSION}.sql
          tar -czf beyond-queue-extension-v${VERSION}-pg${PG}-linux-${{ matrix.arch }}.tar.gz \
            -C dist .
      - uses: actions/upload-artifact@v7
        with:
          name: extension-pg${{ matrix.pg }}-${{ matrix.arch }}
          path: beyond-queue-extension-*.tar.gz
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            beyond-queue-extension-*.tar.gz
