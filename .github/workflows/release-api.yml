name: Release API
on:
  push:
    tags:
      - "api-v*"
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pgmq-rx-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: pgmq-rx-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - name: Install cross
        run: cargo install cross
      - name: Build
        run: cross build --release --bin pgmq-rx --target ${{ matrix.target }}
        env:
          SQLX_OFFLINE: "true"
      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/pgmq-rx ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pgmq-rx-linux-amd64/pgmq-rx-linux-amd64
            pgmq-rx-linux-arm64/pgmq-rx-linux-arm64
